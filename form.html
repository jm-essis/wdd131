<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description"
      content="This is my Ivory Coast specific place page that i wrote. Ivory Coast is i beautiful country ">
    <meta name="author" content="Jean Marc Essis">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <div class="form-group">
                <label for="product-name">Product Name</label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset class="form-group">
                <legend>Overall Rating</legend>
                <div class="rating-container">
                    <input type="radio" id="rating-1" name="rating" value="1" required>
                    <label for="rating-1">☆</label>

                    <input type="radio" id="rating-2" name="rating" value="2" required>
                    <label for="rating-2">☆☆</label>

                    <input type="radio" id="rating-3" name="rating" value="3" required>
                    <label for="rating-3">☆☆☆</label>

                    <input type="radio" id="rating-4" name="rating" value="4" required>
                    <label for="rating-4">☆☆☆☆</label>

                    <input type="radio" id="rating-5" name="rating" value="5" required>
                    <label for="rating-5">☆☆☆☆☆</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installation-date">Date of Installation</label>
                <input type="date" id="installation-date" name="installationDate" required>
            </div>

            <fieldset class="form-group">
                <legend>Which features did you find useful in the product? <em>(Check all that
                        apply)</em>
                </legend>
                <div class="checkbox-container">
                    <input type="checkbox" id="feature-durability" name="features"
                      value="durability">
                    <label for="feature-durability">Durability</label>

                    <input type="checkbox" id="feature-ease" name="features" value="ease-of-use">
                    <label for="feature-ease">Ease of Use</label>

                    <input type="checkbox" id="feature-performance" name="features"
                      value="performance">
                    <label for="feature-performance">Performance</label>

                    <input type="checkbox" id="feature-design" name="features" value="design">
                    <label for="feature-design">Design</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="written-review">Written Review <span>(Optional)</span></label>
                <textarea id="written-review" name="writtenReview" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name <span>(Optional)</span></label>
                <input type="text" id="user-name" name="userName">
            </div>

            <input type="submit" value="Post Review" id="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Jean Marc Essis | Côte d'Ivoire</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
